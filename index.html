<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TVINKY & TILT | DONATE SYSTEM</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #ffd700; --dark: #0a0a12; --card: #161625; --green: #00ff88; --blue: #3498db; }
        body { background: var(--dark); color: white; font-family: 'Roboto', sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: radial-gradient(circle at center, #1a1a2e 0%, #0a0a12 100%); overflow-x: hidden; }
        .home-btn { position: fixed; top: 20px; left: 20px; background: rgba(255, 215, 0, 0.1); border: 1px solid var(--gold); color: var(--gold); padding: 10px 15px; border-radius: 12px; cursor: pointer; z-index: 100; font-family: 'Orbitron', sans-serif; transition: 0.3s; }
        #newsOverlay { position: fixed; top: 0; left: -100%; width: 100%; height: 100%; background: var(--dark); z-index: 200; transition: 0.5s ease-in-out; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        #newsOverlay.active { left: 0; }
        .close-news { background: none; border: 1px solid #ff00ff; color: #ff00ff; padding: 8px 20px; border-radius: 10px; cursor: pointer; margin-bottom: 20px; }
        .article-card { background: var(--card); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 20px; margin-bottom: 20px; border-left: 4px solid var(--gold); }
        .article-card img { width: 100%; border-radius: 10px; margin-bottom: 15px; display: block; }
        .article-card h4 { color: var(--gold); margin: 0 0 10px 0; font-family: 'Orbitron', sans-serif; }
        .order-container { width: 95%; max-width: 480px; background: var(--card); padding: 25px; border-radius: 25px; border: 1px solid rgba(255,215,0,0.15); box-shadow: 0 25px 60px rgba(0,0,0,0.7); margin: 20px; }
        h2 { font-family: 'Orbitron', sans-serif; color: var(--gold); text-align: center; margin-bottom: 20px; font-size: 1.4rem; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 6px; font-size: 0.75rem; color: #888; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; background: #0f0f1b; border: 1px solid #333; color: white; border-radius: 12px; box-sizing: border-box; outline: none; }
        .file-upload { border: 2px dashed #333; padding: 12px; text-align: center; border-radius: 12px; cursor: pointer; color: #aaa; font-size: 0.85rem; }
        .btn-submit { width: 100%; padding: 15px; background: linear-gradient(45deg, var(--gold), #ffaa00); border: none; border-radius: 12px; color: #000; font-weight: 800; font-family: 'Orbitron', sans-serif; cursor: pointer; margin-top: 10px; }
        #queueSection { display: none; text-align: center; }
        .loader { border: 4px solid #1a1a2e; border-top: 4px solid var(--gold); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<button class="home-btn" onclick="toggleNews()">🏠 HOME</button>

<div id="newsOverlay">
    <button class="close-news" onclick="toggleNews()">← ORQAGA</button>
    <h2 style="text-align: left;">AKSIYALAR</h2>
    <div id="articlesContainer">
        <p style="text-align:center; color:#555;">Hozircha aksiyalar yo'q...</p>
    </div>
</div>

<div class="order-container">
    <div id="formSection">
        <h2>TVINKY & TILT</h2>
        <form id="orderForm">
            <div class="form-group"><label>O'yin ID (Server):</label><input type="text" id="gameId" placeholder="12345678 (1234)" required></div>
            <div class="form-group">
                <label>Paket:</label>
                <select id="packet" required>
                    <option value="" disabled selected>Tanlang...</option>
                    <option value="Weekly Pass - 21.000">HAFTALIK PASS — 21.000</option>
                    <option value="110 ⭐ - 24.000">110 ⭐ — 24.000</option>
                    <option value="706 ⭐ - 130.000">706 ⭐ — 130.000</option>
                </select>
            </div>
            <div class="form-group">
                <label>To'lov cheki:</label>
                <div class="file-upload" onclick="document.getElementById('fileInput').click()">
                    <span id="fileName">Rasm tanlash...</span>
                    <input type="file" id="fileInput" hidden accept="image/*" onchange="updateFileName(this)">
                </div>
            </div>
            <button type="submit" class="btn-submit">SOTIB OLISH 🚀</button>
        </form>
    </div>
    <div id="queueSection">
        <h3>Qabul qilindi!</h3>
        <div class="loader" id="loader"></div>
        <p>Navbatingiz: <span id="queueNum" style="color:var(--green); font-weight:bold;">#--</span></p>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDv2loG-xJIKs0WLFAJc1JmzRHUMvRQgZg",
        authDomain: "donatehtml-6ccd1.firebaseapp.com",
        projectId: "donatehtml-6ccd1",
        storageBucket: "donatehtml-6ccd1.appspot.com",
        messagingSenderId: "335854949718",
        appId: "1:335854949718:web:056e391b3fc1510c1df2f7",
        databaseURL: "https://donatehtml-6ccd1-default-rtdb.europe-west1.firebasedatabase.app/"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function toggleNews() { document.getElementById('newsOverlay').classList.toggle('active'); }
    function updateFileName(input) { if (input.files[0]) document.getElementById('fileName').innerText = "✅ Rasm tayyor"; }

    // Загрузка акций из базы
    db.ref('articles').on('value', (snap) => {
        const container = document.getElementById('articlesContainer');
        container.innerHTML = '';
        const data = snap.val();
        for (let id in data) {
            const item = data[id];
            container.innerHTML += `
                <div class="article-card">
                    ${item.image ? `<img src="${item.image}">` : ''}
                    <h4>${item.title}</h4>
                    <p>${item.text}</p>
                </div>`;
        }
    });

    document.getElementById('orderForm').onsubmit = function(e) {
        e.preventDefault();
        const botToken = '8749291196:AAGChO11ZGlYJ68XX_UWuCXyviQzzqlOVbQ';
        const chatId = '1743637553';
        const gameId = document.getElementById('gameId').value;
        const packet = document.getElementById('packet').value;
        const fileInput = document.getElementById('fileInput');
        const qNum = Math.floor(Math.random() * 5) + 2;

        const text = `🚀 YANGI BUYURTMA!\n\n👤 ID: ${gameId}\n💎 Paket: ${packet}\n🔢 Navbat: #${qNum}`;
        const fd = new FormData();
        fd.append('chat_id', chatId);
        if (fileInput.files[0]) {
            fd.append('photo', fileInput.files[0]);
            fd.append('caption', text);
            fetch(`https://api.telegram.org/bot${botToken}/sendPhoto`, { method: 'POST', body: fd });
        } else {
            fd.append('text', text);
            fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, { method: 'POST', body: fd });
        }

        document.getElementById('formSection').style.display = 'none';
        document.getElementById('queueSection').style.display = 'block';
        document.getElementById('queueNum').innerText = "#" + qNum;
    };
</script>
</body>
</html>
